name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: "**/uv.lock"
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: "backend/pyproject.toml"
      - name: Install dependencies
        run: uv sync --all-extras --dev
      - name: Run Ruff
        run: uv run ruff check .

  type-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: "**/uv.lock"
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: "backend/pyproject.toml"
      - name: Install dependencies
        run: uv sync --all-extras --dev
      - name: Run mypy
        run: uv run mypy app
        env:
          ENVIRONMENT: local
          SECRET_KEY: test-secret-key-for-testing-only

  # The `test` (pytest) and `frontend-e2e` (Playwright) jobs are temporarily
  # disabled. The test code is intentionally retained — re-enable by reverting
  # the commit that removed the jobs from this file.
