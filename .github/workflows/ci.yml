name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "**/uv.lock"
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: "backend/pyproject.toml"
      - name: Install dependencies
        run: uv sync --all-extras --dev
      - name: Run Ruff
        run: uv run ruff check .

  type-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "**/uv.lock"
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: "backend/pyproject.toml"
      - name: Install dependencies
        run: uv sync --all-extras --dev
      - name: Run mypy
        run: uv run mypy app
        env:
          ENVIRONMENT: local
          SECRET_KEY: test-secret-key-for-testing-only

  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "**/uv.lock"
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: "backend/pyproject.toml"
      - name: Install dependencies
        run: uv sync --all-extras --dev
      - name: Run tests
        run: uv run pytest
        env:
          ENVIRONMENT: local
          SECRET_KEY: test-secret-key-for-testing-only

  frontend-e2e:
    runs-on: ubuntu-latest
    services:
      db:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: changethis
          POSTGRES_DB: appdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "frontend/package-lock.json"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "**/uv.lock"

      - name: Start backend (background)
        # DB is already healthy via service container health-check — no sleep needed
        run: |
          (
            cd backend
            uv sync --frozen
            uv run alembic upgrade head
            uv run python -m app.commands.create_first_superuser
            uv run uvicorn app.main:app --host 0.0.0.0 --port 8000
          ) &
        env:
          ENVIRONMENT: local
          POSTGRES_SERVER: localhost
          POSTGRES_PORT: 5432
          POSTGRES_DB: appdb
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: changethis
          ENABLE_REDIS_QUEUE: "false"
          ENABLE_REDIS_RATE_LIMIT: "false"
          SECRET_KEY: test-secret-key-for-ci-only
          ADMIN_EMAIL: admin@example.com
          ADMIN_USERNAME: admin
          ADMIN_PASSWORD: Change-me2

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Get Playwright version
        id: playwright-version
        working-directory: frontend
        run: echo "version=$(npm list @playwright/test --depth=0 | grep @playwright/test | awk -F@ '{print $NF}')" >> $GITHUB_OUTPUT

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright browsers and deps
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Install Playwright system deps only
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        working-directory: frontend
        run: npx playwright install-deps chromium

      - name: Wait for backend
        run: |
          timeout 120 bash -c 'until curl -sf http://localhost:8000/api/v1/health; do sleep 2; done' || {
            echo "Backend health check failed"
            exit 1
          }

      - name: Run Playwright tests
        working-directory: frontend
        run: npx playwright test
        env:
          VITE_API_URL: http://localhost:8000
          ADMIN_EMAIL: admin@example.com
          ADMIN_PASSWORD: Change-me2

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7
